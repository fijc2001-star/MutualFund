services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: mutualfund
      POSTGRES_PASSWORD: mutualfund
      POSTGRES_DB: mutualfund
    ports:
      - "5432:5432"
    volumes:
      - mutualfund_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mutualfund"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mutualfund_pg:
